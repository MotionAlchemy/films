<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Showreel - James Kiernan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        body {
            background-color: #f8f9fa;
            color: #333;
            font-family: 'Arial', sans-serif;
        }

        .navbar {
            background-color: rgba(255, 255, 255, 0.9) !important;
        }

        img {
            padding-top: 20px;
        }

        .col-md-8.mx-auto {
            width: 100%;
            padding-top: 20px;
        }

        /* Back to top button */
        #backToTop {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 55px;
            height: 55px;
            background-color: black;
            color: white;
            border: none;
            border-radius: 12px; /* Smooth edges but still a square */
            cursor: pointer;
            font-size: 24px;
            display: none;
            align-items: center;
            justify-content: center;
            transition: opacity 0.4s ease-in-out, transform 0.3s;
            box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.2);
            opacity: 0; /* Initially invisible */
        }

        #backToTop:hover {
            background-color: #0056b3;
            transform: scale(1.1);
        }

        #backToTop.show {
            display: flex;
            opacity: 1;
        }
    </style>

</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light fixed-top">
        <div class="container">
            <a class="navbar-brand" href="James Kiernan.html">James Kiernan</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="About Me.html">About</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="Showreel.html">Showreel</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="Contact.html">Contact</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5 pt-5">

        <!-- Back to top button -->
        <button id="backToTop" title="Go to top"><i class="fa-solid fa-angle-up"></i></button>

        <!-- First showreel -->
        <h1 class="mb-4">Showreel</h1>
        <div class="row">
            <div class="col-md-8 mx-auto">
                <div style="padding:56.25% 0 0 0;position:relative;"><iframe src="https://player.vimeo.com/video/1046458039?badge=0&amp;autopause=0&amp;player_id=0&amp;app_id=58479" frameborder="0" allow="autoplay; fullscreen; picture-in-picture; clipboard-write; encrypted-media" style="position:absolute;top:0;left:0;width:100%;height:100%;" title="80 Second Showreel 2025"></iframe></div><script src="https://player.vimeo.com/api/player.js"></script>
            </div>
        </div>

        <div class="row">
            <h1 style="padding-top: 80px;">Images</h1>
            <div class="col-md-4 mb-4">
                <img src="364790854_1237908366912938_8568114766829882573_n.jpg" alt="Photo 1" class="img-fluid rounded">
            </div>
            <div class="col-md-4 mb-4">
                <img src="364790854_1237908366912938_8568114766829882573_n.jpg" alt="Photo 2" class="img-fluid rounded">
            </div>
            <div class="col-md-4 mb-4">
                <img src="364790854_1237908366912938_8568114766829882573_n.jpg" alt="Photo 3" class="img-fluid rounded">
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
    const backToTop = document.getElementById("backToTop");

    window.addEventListener("scroll", function () {
        if (window.scrollY > 300) {
            backToTop.classList.add("show");
        } else {
            backToTop.classList.remove("show");
        }
    });

    backToTop.addEventListener("click", function () {
            window.scrollTo({ top: 0, behavior: "smooth" });
        });
    });


    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
