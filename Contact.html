<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - James Kiernan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            background-color: #f8f9fa;
            color: #333;
            font-family: 'Arial', sans-serif;
            padding-top: 100px;
        }
        .navbar {
            background-color: rgba(255, 255, 255, 0.9) !important;
        }
        .social-icons a {
            color: #333;
            font-size: 38px;
            margin-right: 15px;
        }
        .social-icons {
            margin-left: 20%;
            padding-top: 10%;
        }
        .fab.fa-facebook:hover {
            color: #1877F2;
        }
        .fab.fa-instagram:hover {
            color: #E1306C;
        }
        .fab.fa-youtube:hover {
            color: #FF0000;
        }
        .fab.fa-linkedin:hover {
            color: #0077B5;
        }
        p {
            margin-left: 20%;
        }
        .pt-5 {
            padding-left: 5%;
        }

        @media screen and (max-width: 480px) {
                    .social-icons, p {
                        text-align: center;
                        margin: 0px;
                        padding-bottom: 15px;
                    }
                    .btn.btn-primary {
                        width: 100%;
                    }
                    .social-icons a {
                        font-size: 38px;
                    }
                }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light fixed-top">
        <div class="container">
            <a class="navbar-brand" href="James Kiernan.html">James Kiernan</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="About Me.html">About</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="Showreel.html">Showreel</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="Contact.html">Contact</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5 pt-5">
        <h1 class="mb-4">Contact Me</h1>
        <div class="row">
            <div class="col-md-6">
                <form>
                    <div class="mb-3">
                        <label for="name" class="form-label">Name</label>
                        <input type="text" class="form-control" id="name" required>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" required>
                    </div>
                    <div class="mb-3">
                        <label for="message" class="form-label">Message</label>
                        <textarea class="form-control" id="message" rows="5" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Send Message</button>
                </form>
            </div>
            <div class="col-md-6">
                <div class="social-icons mb-4">
                    <a href="https://www.linkedin.com/in/james-kiernan-66346a194/" target="_blank"><i class="fab fa-linkedin"></i></a>
                </div>
                <p>Email: <a href="mailto:motion.alchemy.films@gmail.com">motion.alchemy.films@gmail.com</a></p>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
